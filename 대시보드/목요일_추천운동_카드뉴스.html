<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>310 다이어트 — 목요일 추천운동</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --c-bg-light: #f0f5fb;
    --c-bg-dark: #dde8f5;
    --c-purple: #4f7ed7;
    --c-purple-deep: #2c4d8a;
    --c-purple-light: #93b8eb;
    --c-purple-soft: #e3edf8;
    --c-text: #2a2a2a;
    --c-text-mute: #888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    padding: 36px 16px 80px;
    background: #ececef;
    font-family: 'Noto Sans KR', -apple-system, 'Apple SD Gothic Neo', sans-serif;
    color: var(--c-text);
    -webkit-font-smoothing: antialiased;
  }

  .wrapper { max-width: 580px; margin: 0 auto; }

  .page-header { text-align: center; margin-bottom: 24px; }
  .page-header h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .page-header p { font-size: 13px; color: #666; }

  .card-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 22px 0 12px;
  }
  .card-label { font-size: 14px; font-weight: 700; color: #444; }
  .download-btn {
    background: var(--c-purple);
    color: white;
    border: none;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
  }
  .download-btn:hover { background: var(--c-purple-deep); }

  /* ===== 카드 본체 1080×1080 정사각형 ===== */
  .card {
    width: 540px;
    height: 540px;
    margin: 0 auto;
    border-radius: 14px;
    box-shadow: 0 12px 36px rgba(44, 77, 138, 0.18);
    overflow: hidden;
    position: relative;
    background: linear-gradient(155deg, var(--c-bg-light) 0%, var(--c-bg-dark) 100%);
    padding: 30px 28px 26px;
    display: flex;
    flex-direction: column;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -60px;
    right: -60px;
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, rgba(147, 184, 235, 0.25) 0%, transparent 65%);
    pointer-events: none;
  }

  .day-label {
    display: inline-block;
    background: var(--c-purple);
    color: white;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.8px;
    padding: 6px 16px;
    border-radius: 999px;
    margin-bottom: 12px;
    align-self: flex-start;
  }

  .title {
    font-size: 32px;
    font-weight: 900;
    color: var(--c-text);
    margin-bottom: 6px;
    letter-spacing: -0.8px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 13px;
    color: var(--c-text-mute);
    margin-bottom: 18px;
    font-weight: 500;
  }

  .workouts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    flex: 1;
    min-height: 0;
  }

  .workout-card {
    background: white;
    border-radius: 16px;
    padding: 12px 12px 14px;
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: 0 4px 14px rgba(44, 77, 138, 0.10);
    overflow: hidden;
  }

  .workout-num {
    position: absolute;
    top: 10px;
    left: 10px;
    background: var(--c-purple);
    color: white;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 900;
    z-index: 2;
    box-shadow: 0 2px 6px rgba(79, 126, 215, 0.4);
  }

  .workout-img {
    width: 100%;
    aspect-ratio: 1/1;
    background: linear-gradient(135deg, var(--c-purple-soft) 0%, var(--c-purple-light) 100%);
    border-radius: 12px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    overflow: hidden;
    position: relative;
  }
  .workout-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .workout-img .placeholder-icon {
    filter: drop-shadow(0 2px 4px rgba(44, 77, 138, 0.3));
  }

  .workout-sub {
    font-size: 11px;
    color: var(--c-text-mute);
    font-weight: 600;
    margin-bottom: 3px;
    line-height: 1.3;
  }

  .workout-name {
    font-size: 17px;
    font-weight: 900;
    color: var(--c-text);
    margin-bottom: 8px;
    letter-spacing: -0.4px;
    line-height: 1.2;
    flex: 1;
  }

  .workout-week {
    font-size: 10.5px;
    color: var(--c-purple);
    font-weight: 800;
    letter-spacing: -0.2px;
  }
  .workout-week::before {
    content: '▶';
    font-size: 8px;
    margin-right: 4px;
  }

  .cta-banner {
    background: white;
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 800;
    color: var(--c-purple-deep);
    text-align: center;
    margin: 12px 0 10px;
    border: 1.5px dashed var(--c-purple-light);
    letter-spacing: -0.2px;
  }
  .cta-banner b { color: var(--c-purple); font-weight: 900; }

  .bottom-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .bottom-line .msg {
    font-size: 17px;
    font-weight: 900;
    color: var(--c-text);
    letter-spacing: -0.4px;
  }
  .bottom-line .logo {
    font-size: 10px;
    font-weight: 900;
    color: var(--c-purple);
    letter-spacing: 1.5px;
    background: white;
    padding: 6px 11px;
    border-radius: 999px;
    border: 2px solid var(--c-purple);
  }

  /* 캡처 스테이지 */
  .capture-stage {
    position: fixed;
    left: -10000px;
    top: 0;
    width: 1080px;
    pointer-events: none;
  }

  @media (max-width: 600px) {
    .wrapper { max-width: 100%; }
    .card { width: 100%; height: auto; aspect-ratio: 1/1; padding: 26px 22px; }
    .title { font-size: 26px; }
  }
</style>
</head>

<div class="capture-stage" id="captureStage"></div>

<script>
  function downloadCard(id, filename) {
    if (!window.html2canvas) { alert('html2canvas 로드 실패'); return; }
    var original = document.getElementById(id);
    if (!original) return;

    var stage = document.getElementById('captureStage');
    stage.innerHTML = '';
    var clone = original.cloneNode(true);
    clone.style.width = '1080px';
    clone.style.height = '1080px';
    clone.style.boxShadow = 'none';
    clone.style.borderRadius = '0';
    clone.style.padding = '60px 56px 52px';
    clone.id = 'cloneCard';

    var styleScale = document.createElement('style');
    styleScale.textContent = `
      #cloneCard .day-label { font-size: 22px !important; padding: 12px 32px !important; margin-bottom: 24px !important; letter-spacing: 3.6px !important; }
      #cloneCard .title { font-size: 64px !important; margin-bottom: 12px !important; }
      #cloneCard .subtitle { font-size: 26px !important; margin-bottom: 36px !important; }
      #cloneCard .workouts { gap: 24px !important; }
      #cloneCard .workout-card { padding: 24px 24px 28px !important; border-radius: 32px !important; }
      #cloneCard .workout-num { width: 52px !important; height: 52px !important; font-size: 28px !important; top: 20px !important; left: 20px !important; }
      #cloneCard .workout-img { margin-bottom: 20px !important; border-radius: 24px !important; font-size: 112px !important; }
      #cloneCard .workout-sub { font-size: 22px !important; margin-bottom: 6px !important; }
      #cloneCard .workout-name { font-size: 34px !important; margin-bottom: 16px !important; }
      #cloneCard .workout-week { font-size: 21px !important; }
      #cloneCard .workout-week::before { font-size: 16px !important; margin-right: 8px !important; }
      #cloneCard .cta-banner { font-size: 24px !important; padding: 16px 28px !important; margin: 24px 0 20px !important; border-radius: 20px !important; border-width: 3px !important; }
      #cloneCard .bottom-line .msg { font-size: 34px !important; }
      #cloneCard .bottom-line .logo { font-size: 20px !important; padding: 12px 22px !important; border-width: 4px !important; letter-spacing: 3px !important; }
    `;
    stage.appendChild(styleScale);
    stage.appendChild(clone);

    html2canvas(clone, { scale: 1, width: 1080, height: 1080, useCORS: true, backgroundColor: null, logging: false })
      .then(function(canvas) {
        var link = document.createElement('a');
        link.download = filename;
        link.href = canvas.toDataURL('image/png');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        stage.innerHTML = '';
      })
      .catch(function(err) {
        alert('이미지 생성 실패: ' + err.message);
        stage.innerHTML = '';
      });
  }
</script>
