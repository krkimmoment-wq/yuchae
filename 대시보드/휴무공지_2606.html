<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>6월 휴무 공지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --peach-bg1:#fbe6d4;
    --peach-bg2:#f6d6bb;
    --card:#ffffff;
    --ink:#3b3431;
    --mute:#9b9088;
    --red:#e23b2a;
    --sun:#e0533f;
    --sat:#4a90d9;
    --gold:#bd8a36;
    --teal:#2a9d8f;
    --teal-soft:#e7f5f2;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Noto Sans KR',-apple-system,sans-serif;
    background:#e9e2da;
    display:flex;justify-content:center;align-items:flex-start;
    padding:24px;-webkit-font-smoothing:antialiased;
  }
  .card{
    position:relative;
    width:720px;height:720px;
    background:linear-gradient(165deg,var(--peach-bg1) 0%,var(--peach-bg2) 100%);
    border-radius:30px;
    padding:30px 34px 26px;
    display:flex;flex-direction:column;
    box-shadow:0 18px 50px rgba(120,80,50,.18);
    overflow:hidden;color:var(--ink);
  }

  /* header */
  .eyebrow{
    display:flex;align-items:center;justify-content:center;gap:10px;
    font-size:12px;font-weight:700;letter-spacing:.32em;color:#c98a5e;margin-bottom:4px;
  }
  .eyebrow::before,.eyebrow::after{content:"";width:38px;height:1px;background:#d6a986;}
  .eyebrow .dot{width:5px;height:5px;border-radius:50%;background:#d8703f;}
  h1{text-align:center;font-size:40px;font-weight:900;letter-spacing:-.5px;margin-bottom:16px;}

  /* calendar (full width, large) */
  .cal{
    background:var(--card);border-radius:22px;padding:18px 20px 14px;
    box-shadow:0 6px 18px rgba(120,80,50,.08);
  }
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;}
  .cal-grid .dow{font-size:13px;font-weight:700;padding-bottom:6px;}
  .cal-grid .day{
    position:relative;font-size:16px;font-weight:500;height:46px;
    display:flex;align-items:center;justify-content:center;
  }
  .sun{color:var(--sun);}
  .sat{color:var(--sat);}
  .mark{
    width:34px;height:34px;border-radius:50%;background:var(--red);
    color:#fff !important;font-weight:700;
    display:flex;align-items:center;justify-content:center;
  }
  .tag{
    position:absolute;bottom:1px;left:50%;transform:translateX(-50%);
    font-size:9px;font-weight:700;color:#fff;padding:1px 6px;border-radius:8px;
    white-space:nowrap;line-height:1.4;
  }
  .tag.gold{background:var(--gold);}

  /* info row */
  .info{display:grid;grid-template-columns:1fr 1.15fr;gap:14px;margin-top:14px;}
  .panel{background:var(--card);border-radius:18px;padding:14px 16px;box-shadow:0 6px 18px rgba(120,80,50,.08);}
  .sec-title{font-size:14px;font-weight:900;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .sec-title::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--red);}
  .sched{list-style:none;font-size:13px;}
  .sched li{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1ece6;}
  .sched li:last-child{border-bottom:none;}
  .sched .d{font-weight:700;}
  .sched .w{color:var(--mute);font-size:11px;font-weight:500;}
  .sched .n{color:#5c544e;}

  .live-title{font-size:13px;font-weight:700;color:var(--teal);margin-bottom:8px;}
  .alert{
    background:var(--teal-soft);border:1px solid #bfe6df;border-radius:12px;
    padding:10px 12px;font-size:12px;line-height:1.55;color:#2c6f66;font-weight:500;
  }
  .alert b{color:var(--teal);font-weight:700;}
  .alert .sq{display:inline-block;width:9px;height:9px;border-radius:2px;background:var(--red);margin-right:5px;vertical-align:middle;}
  .note{font-size:10.5px;color:#8a7f76;margin-top:8px;line-height:1.5;}

  /* footer + coach */
  .foot{margin-top:auto;padding-top:14px;}
  .thanks .big{font-size:30px;font-weight:900;}
  .thanks .big .heart{color:var(--red);}
  .thanks .sign{font-size:12.5px;color:#7a6f66;margin-top:5px;font-weight:500;}
  .thanks .brand{font-size:12.5px;color:#a79c93;}
  .coach{
    position:absolute;right:8px;bottom:0;
    height:200px;width:auto;
    filter:drop-shadow(0 6px 14px rgba(120,80,50,.18));
    pointer-events:none;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow"><span class="dot"></span>JUNE 2026<span class="dot"></span></div>
    <h1>6월 휴무 공지</h1>

    <!-- calendar -->
    <div class="cal">
      <div class="cal-grid">
        <div class="dow sun">일</div><div class="dow">월</div><div class="dow">화</div>
        <div class="dow">수</div><div class="dow">목</div><div class="dow">금</div><div class="dow sat">토</div>

        <div class="day"></div>
        <div class="day">1</div>
        <div class="day">2</div>
        <div class="day"><span class="mark">3</span><span class="tag gold">지방선거일</span></div>
        <div class="day">4</div>
        <div class="day">5</div>
        <div class="day sat"><span class="mark">6</span><span class="tag gold">현충일</span></div>

        <div class="day sun">7</div>
        <div class="day">8</div><div class="day">9</div><div class="day">10</div>
        <div class="day">11</div><div class="day">12</div><div class="day sat">13</div>

        <div class="day sun">14</div>
        <div class="day">15</div><div class="day">16</div><div class="day">17</div>
        <div class="day">18</div><div class="day">19</div><div class="day sat">20</div>

        <div class="day sun">21</div>
        <div class="day">22</div><div class="day">23</div><div class="day">24</div>
        <div class="day">25</div><div class="day">26</div><div class="day sat">27</div>

        <div class="day sun">28</div>
        <div class="day">29</div><div class="day">30</div>
        <div class="day"></div><div class="day"></div><div class="day"></div><div class="day"></div>
      </div>
    </div>

    <!-- info -->
    <div class="info">
      <div class="panel">
        <div class="sec-title">6월 주요 일정</div>
        <ul class="sched">
          <li><span class="d">6월 3일 <span class="w">(수)</span></span><span class="n">지방선거일</span></li>
          <li><span class="d">6월 6일 <span class="w">(토)</span></span><span class="n">현충일</span></li>
        </ul>
      </div>
      <div class="panel">
        <div class="live-title">✓ 라이브 수업 안내</div>
        <div class="alert">
          <span class="sq"></span><b>6월 3일(수) 지방선거일</b>에도 라이브 수업은 <b>영상 수업으로 정상 진행</b>되며, 실시간 코치 큐잉은 진행되지 않습니다.
        </div>
      </div>
    </div>

    <!-- footer -->
    <div class="foot">
      <div class="thanks">
        <div class="big">감사합니다 <span class="heart">♥</span></div>
        <div class="sign">- 록코치 드림</div>
        <div class="brand">모멘트핏 · 310 다이어트 클래스</div>
      </div>
    </div>

    <img class="coach" src="록코치_누끼.png" alt="록코치">
  </div>
</body>
</html>
